name: 5-Minute Live Movie Bot
on:
  schedule:
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [trigger_bot, trigger_movie]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Run Steel Bot
        run: python bot.py

      - name: Run Movie Bot (Live Selenium)
        run: python movies.py
