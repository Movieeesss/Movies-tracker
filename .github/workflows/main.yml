name: 5-Minute Steel and Movie Bot
on:
  schedule:
    # Intha line ovvoru 5 nimishathukkum automatic-ah trigger pannum
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [trigger_bot, trigger_movie]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      # --- RUN BOTH BOTS EVERY 5 MINS ---
      # Schedule moolama varum pothu rendu python files-um run aagum
      
      - name: Run Steel Bot
        run: python bot.py

      - name: Run Movie Bot
        run: python movies.py
